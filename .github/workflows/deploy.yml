name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manually re-running the deploy from the Actions tab.
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v6
        with:
          node-version: 22
        # Reads astro.config.mjs (site + base) and uploads the build as the
        # Pages artifact using Astro 7's supported Node release line.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
