name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manually re-running the deploy from the Actions tab.
  workflow_dispatch:

# Default the GITHUB_TOKEN to read-only; each job asks for what it needs.
permissions:
  contents: read

# Only one Pages deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build with Astro
        uses: withastro/action@e84f40bd8d2caa9e768ec82ad30dd81f0b280853 # v6
        with:
          node-version: 22
        # Reads astro.config.mjs (site + base) and uploads the build as the
        # Pages artifact using Astro 7's supported Node release line.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only the deploy job needs the Pages/OIDC grants.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
