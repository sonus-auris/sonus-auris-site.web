name: CI

# Build-only check for pull requests. The Pages deploy itself lives in
# deploy.yml and only runs on pushes to main; this workflow never deploys
# and never uploads a Pages artifact.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# One run per branch; superseded pushes to the same PR are cancelled.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build with Astro
        run: npm run build
