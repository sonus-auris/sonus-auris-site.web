<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c3b2e"/>
      <stop offset="1" stop-color="#136f4f"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9f43"/>
      <stop offset="1" stop-color="#e8590c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- logo mark -->
  <rect x="90" y="86" width="92" height="92" rx="24" fill="#34c585"/>
  <path d="M118 150c-7 0-13-6-13-17 0-13 10-23 23-23s23 9 23 22c0 10-7 14-13 14-4 0-6-3-6-6s3-4 3-9c0-4-3-7-7-7s-7 3-7 9c0 8 1 11 1 17z"
        fill="none" stroke="#fffdf8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="158" cy="115" r="7" fill="#fd7e14"/>
  <text x="200" y="148" fill="#fffdf8" font-family="Baloo 2, Trebuchet MS, sans-serif" font-weight="800" font-size="46">Sonus Auris</text>

  <text x="90" y="330" fill="#fffdf8" font-family="Baloo 2, Trebuchet MS, sans-serif" font-weight="800" font-size="92">A dashcam</text>
  <text x="90" y="430" fill="#fffdf8" font-family="Baloo 2, Trebuchet MS, sans-serif" font-weight="800" font-size="92">for your <tspan fill="#ff9f43">ears.</tspan></text>
  <text x="90" y="500" fill="rgba(255,253,248,0.82)" font-family="Baloo 2, Trebuchet MS, sans-serif" font-size="34">Always-on audio · Encrypted backup · Open source</text>

  <!-- record ring -->
  <circle cx="980" cy="300" r="150" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="26"/>
  <circle cx="980" cy="300" r="150" fill="none" stroke="url(#ring)" stroke-width="26" stroke-linecap="round" stroke-dasharray="700 943" transform="rotate(-90 980 300)"/>
  <circle cx="980" cy="300" r="80" fill="#fd7e14"/>
  <rect x="955" y="275" width="50" height="50" rx="12" fill="#fffdf8"/>
